version: '3.8'

services:

  db:
    image: postgres:14.7
    container_name: db
    env_file:
      - .env
    volumes: 
      - ~/.pg/pgdata/app:/var/lib/postgresql/data
    
     
  app:
    build:
      context: .
    container_name: django
    env_file:
      - .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    

  redis:
    image: redis:alpine
    hostname: redis

  celery:
    build:
      context: .
    command: celery -A core worker -l info
    volumes:
      - .:/app 
    env_file:
      - .env
    links:
      - redis
    depends_on:
      - db
      - redis
      - app

  